<!-- פילטרים, כלי עבודה וכפתורי תצוגה -->
        <div class="bg-white border rounded-2xl p-4 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex flex-wrap items-center gap-2 bg-slate-100 p-1 rounded-xl text-xs font-black">
                <button id="filter-all" onclick="setFilter('all')" class="px-3 py-1.5 rounded-lg bg-white text-blue-600 shadow-sm">📋 כל המוצרים</button>
                <button id="filter-to-order" onclick="setFilter('to-order')" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-200">🛒 מוצרים לחסר</button>
                <button id="filter-in-stock" onclick="setFilter('in-stock')" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-200">✅ מלאי תקין</button>
            </div>

            <!-- בורר סוג תצוגה חדש -->
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl text-xs font-black">
                <button id="view-grid-btn" onclick="setViewMode('grid')" class="px-3 py-1.5 rounded-lg bg-blue-600 text-white shadow-sm">📱 קוביות</button>
                <button id="view-table-btn" onclick="setViewMode('table')" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-200">📋 טבלה</button>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="startWalkthroughMode()" class="px-5 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-xs font-black shadow-lg transition transform hover:scale-105 animate-pulse">⏱️ ספירת מלאי מהירה</button>
                <div class="h-6 w-px bg-slate-200"></div>
                <div class="relative inline-block">
                    <button onclick="toggleSharePopover()" class="p-2.5 bg-slate-100 hover:bg-slate-200 rounded-xl text-xs font-black flex items-center gap-1">
                        <span>📤 שיתוף הדוח</span>
                    </button>
                    <div id="share-popover" class="hidden absolute left-0 mt-1.5 bg-white border border-slate-200 shadow-xl rounded-xl p-1.5 flex gap-1 z-30 animate-fade-in whitespace-nowrap">
                        <button onclick="exportData('copy')" class="px-2.5 py-1 text-[11px] font-bold hover:bg-slate-100 rounded-lg text-slate-700">📋 העתק ללוח</button>
                        <button onclick="exportData('whatsapp')" class="px-2.5 py-1 text-[11px] font-bold hover:bg-emerald-50 rounded-lg text-emerald-700">💬 וואטסאפ</button>
                        <button onclick="exportData('email')" class="px-2.5 py-1 text-[11px] font-bold hover:bg-blue-50 rounded-lg text-blue-700">📧 מייל</button>
                        <button onclick="exportData('csv')" class="px-2.5 py-1 text-[11px] font-bold hover:bg-purple-50 rounded-lg text-purple-700">💾 ייצוא Excel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- מכלול המלאי הדינמי -->
        <div id="inventory-container" class="space-y-6"></div>
